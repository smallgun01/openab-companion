<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OpenAB Companion</title>
  <link rel="stylesheet" href="css/style.css">
  <script type="importmap">
  {
    "imports": {
      "three": "https://esm.sh/three@0.170.0",
      "three/": "https://esm.sh/three@0.170.0/",
      "@pixiv/three-vrm": "https://esm.sh/@pixiv/three-vrm@3.0.0",
      "@pixiv/three-vrm/": "https://esm.sh/@pixiv/three-vrm@3.0.0/"
    }
  }
  </script>
</head>
<body>
  <div id="app">
    <!-- VRM Scene Panel -->
    <div id="vrm-panel">
      <canvas id="vrm-canvas"></canvas>
      <div id="model-prompt">
        <p>🎭 No VRM model loaded</p>
        <button class="btn primary" onclick="document.getElementById('model-file-input').click()">
          Choose .vrm file
        </button>
      </div>
    </div>

    <!-- Chat Panel -->
    <div id="chat-panel">
      <div id="chat-header">
        <h1>OpenAB Companion</h1>
        <div id="header-actions">
          <button class="icon-btn" id="change-model-btn" title="Change model" aria-label="Change VRM model">🎭</button>
          <input type="file" id="model-file-input" accept=".vrm" hidden aria-hidden="true">
          <button class="icon-btn" id="settings-btn" title="Settings" aria-label="Open settings">⚙️</button>
        </div>
      </div>

      <div id="messages" role="log" aria-live="polite" aria-label="Chat messages"></div>

      <div id="input-area">
        <textarea id="chat-input" rows="1" placeholder="Type a message…" disabled></textarea>
        <button id="send-btn" disabled>▶</button>
      </div>

      <div id="status-bar">
        <span class="status-dot" id="status-dot"></span>
        <span id="status-text">Loading…</span>
      </div>
    </div>
  </div>

  <!-- Settings Overlay -->
  <div id="settings-overlay">
    <div id="settings-panel">
      <h2>Settings</h2>
      <div class="field">
        <label for="setting-endpoint">OpenAB Endpoint URL</label>
        <input type="text" id="setting-endpoint" placeholder="https://your-gateway.example.com/v1/chat/completions">
      </div>
      <div class="field">
        <label for="setting-token">Bearer Token (optional)</label>
        <input type="text" id="setting-token" placeholder="sk-...">
      </div>
      <div class="field">
        <label for="setting-bgcolor">Background Color</label>
        <input type="color" id="setting-bgcolor" value="#1a1a2e">
      </div>
      <div id="settings-actions">
        <button class="btn" id="settings-close">Cancel</button>
        <button class="btn primary" id="settings-save">Save</button>
      </div>
    </div>
  </div>

  <script>window.onerror=function(m){document.getElementById('status-text').textContent='ERR: '+m;};console.log('DOM ready');</script>
  <script type="module">console.log('ES module works');</script>
  <script type="module" src="js/main.js"></script>
</body>
</html>
